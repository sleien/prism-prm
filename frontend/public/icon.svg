<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- Incoming white light, striking the left face of the prism -->
  <line x1="3" y1="33" x2="23" y2="33" stroke="#e8eaf0" stroke-width="2.5"/>

  <!-- Dispersed spectrum leaving the right face. Light refracts toward the
       prism's base, so every ray bends downward; red deviates least and violet
       most — the physically correct order. -->
  <g stroke-width="2.5">
    <line x1="43" y1="33" x2="61" y2="34.5" stroke="#ef4444"/>
    <line x1="43" y1="33" x2="61" y2="36.5" stroke="#f97316"/>
    <line x1="43" y1="33" x2="61" y2="38.5" stroke="#eab308"/>
    <line x1="43" y1="33" x2="61" y2="40.5" stroke="#22c55e"/>
    <line x1="43" y1="33" x2="61" y2="42.5" stroke="#3b82f6"/>
    <line x1="43" y1="33" x2="61" y2="44.5" stroke="#8b5cf6"/>
  </g>

  <!-- Glass prism, apex up -->
  <path d="M33 12 L49 46 L17 46 Z" fill="#8b5cf6" fill-opacity="0.16"
        stroke="#a78bfa" stroke-width="2.5"/>
</svg>
